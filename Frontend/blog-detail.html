<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">Blog | UIUSVS</title>
    <meta
      name="description"
      id="page-description"
      content="Read stories, spiritual insights, and updates from the UIU Sanatani Vidyarthi Samsad."
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#fffaf0",
                100: "#ffedd5",
                500: "#ea580c",
                700: "#b91c1c",
                900: "#4a0404",
              },
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              serif: ["Playfair Display", "serif"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #fffaf0;
        color: #4a0404;
        overflow-x: hidden;
      }
      .glass-nav {
        background: rgba(255, 250, 240, 0.9);
        backdrop-filter: blur(12px);
        border-bottom: 2px solid #fbbf24;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #fffaf0;
      }
      ::-webkit-scrollbar-thumb {
        background: #ea580c;
        border-radius: 4px;
      }
      .mandala-pattern {
        background-image:
          radial-gradient(
            circle at 50% 50%,
            rgba(255, 215, 0, 0.05) 0%,
            transparent 70%
          ),
          url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23b91c1c' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M30 0L60 30L30 60L0 30z'/%3E%3C/g%3E%3C/svg%3E");
        background-attachment: fixed;
      }
      /* Article body content styling (from the rich text editor) */
      #article-content {
        line-height: 1.8;
      }
      #article-content h1 {
        font-family: "Playfair Display", serif;
        font-size: 1.875rem;
        font-weight: 700;
        color: #4a0404;
        margin: 1.5rem 0 0.75rem;
      }
      #article-content h2 {
        font-family: "Playfair Display", serif;
        font-size: 1.5rem;
        font-weight: 700;
        color: #4a0404;
        margin: 1.5rem 0 0.75rem;
      }
      #article-content h3 {
        font-family: "Playfair Display", serif;
        font-size: 1.25rem;
        font-weight: 700;
        color: #4a0404;
        margin: 1.25rem 0 0.5rem;
      }
      #article-content p {
        margin-bottom: 1rem;
        color: #374151;
      }
      #article-content a {
        color: #b91c1c;
        font-weight: 600;
        text-decoration: underline;
      }
      #article-content img {
        border-radius: 0.75rem;
        margin: 1.5rem 0;
        max-width: 100%;
      }
      #article-content ul,
      #article-content ol {
        margin: 1rem 0 1rem 1.5rem;
        color: #374151;
      }
      #article-content ul {
        list-style-type: disc;
      }
      #article-content ol {
        list-style-type: decimal;
      }
      #article-content blockquote {
        border-left: 4px solid #ea580c;
        background: #fffaf0;
        padding: 1rem 1.25rem;
        margin: 1.5rem 0;
        font-style: italic;
        color: #7c2d12;
        border-radius: 0 0.5rem 0.5rem 0;
      }
      #article-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 1.5rem 0;
      }
      #article-content td,
      #article-content th {
        border: 1px solid #fed7aa;
        padding: 0.5rem 0.75rem;
      }
      #article-content iframe {
        width: 100%;
        aspect-ratio: 16/9;
        height: auto;
        border-radius: 0.75rem;
        margin: 1.5rem 0;
      }
    </style>
  </head>
  <body class="antialiased flex flex-col min-h-screen mandala-pattern">
    <header class="glass-nav sticky top-0 z-50 shadow-sm">
      <div
        class="container mx-auto px-4 py-3 flex justify-between items-center"
      >
        <a
          href="index.html"
          class="flex items-center gap-2 group cursor-pointer py-1 pl-1 pr-4 rounded-2xl bg-white/70 border border-orange-200 shadow-sm hover:shadow-md h-12 sm:h-14"
        >
          <img
            src="https://res.cloudinary.com/yslkb5jl/image/upload/v1782901288/favicon_hsl3pt.png"
            alt="UIUSVS Logo"
            class="h-8 w-8 sm:h-11 sm:w-11 object-contain rounded-full shadow-md border-[2px] border-orange-300 bg-white group-hover:scale-105 transition-transform"
            onerror="
              this.src = 'https://placehold.co/100x100/fffaf0/4a0404?text=SVS'
            "
          />
          <span
            class="text-base sm:text-xl font-black tracking-tight text-red-900 font-serif whitespace-nowrap"
            >UIU SVS</span
          >
        </a>

        <nav class="hidden md:flex gap-6 items-center">
          <a
            href="index.html"
            class="text-sm font-bold text-gray-700 hover:text-brand-700 transition"
            >Home</a
          >
          <a
            href="members.html"
            class="text-sm font-bold text-gray-700 hover:text-brand-700 transition"
            >Members</a
          >
          <a
            href="gallery.html"
            class="text-sm font-bold text-gray-700 hover:text-brand-700 transition"
            >Gallery</a
          >
          <a
            href="blog.html"
            class="text-sm font-bold text-brand-700 border-b-2 border-brand-700 pb-1"
            >Blog</a
          >
          <a
            href="login.html"
            class="text-sm font-bold text-white bg-brand-700 px-4 py-1.5 rounded-full hover:bg-brand-900 transition shadow-sm"
            >My Profile</a
          >
        </nav>

        <a
          href="blog.html"
          class="md:hidden p-2.5 text-red-800 hover:bg-red-50 rounded-xl transition-all"
        >
          <i data-lucide="arrow-left" class="w-6 h-6"></i>
        </a>
      </div>
    </header>

    <main
      class="container mx-auto px-4 py-10 sm:py-14 flex-1 relative z-10 max-w-3xl"
    >
      <!-- Loading state -->
      <div id="loading-state" class="text-center py-24">
        <i
          data-lucide="loader-2"
          class="w-10 h-10 animate-spin mx-auto text-brand-500"
        ></i>
        <p class="text-gray-400 text-sm mt-4">Loading article...</p>
      </div>

      <!-- Error state -->
      <div id="error-state" class="hidden text-center py-24">
        <i data-lucide="file-x" class="w-14 h-14 mx-auto text-gray-300"></i>
        <h1 class="text-2xl font-bold text-brand-900 font-serif mt-4">
          Article Not Found
        </h1>
        <p class="text-gray-500 text-sm mt-2">
          This blog post may have been removed or the link is incorrect.
        </p>
        <a
          href="blog.html"
          class="inline-flex items-center mt-6 px-5 py-2.5 rounded-full bg-brand-700 text-white text-sm font-bold hover:bg-brand-900 transition-colors"
        >
          <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Back to Blog
        </a>
      </div>

      <!-- Article -->
      <article id="article-wrap" class="hidden">
        <a
          href="blog.html"
          class="inline-flex items-center text-sm font-bold text-brand-600 hover:text-brand-800 mb-6 transition-colors"
        >
          <i data-lucide="arrow-left" class="w-4 h-4 mr-1.5"></i> Back to all
          articles
        </a>

        <span
          id="article-category"
          class="inline-block bg-brand-50 text-brand-700 text-[11px] font-extrabold px-3 py-1 rounded-full border border-brand-100 mb-4"
        ></span>

        <h1
          id="article-title"
          class="text-3xl sm:text-4xl font-serif font-extrabold text-brand-900 leading-tight mb-4"
        ></h1>

        <div
          class="flex items-center gap-3 text-xs text-gray-500 font-bold uppercase tracking-wider mb-8 pb-6 border-b border-orange-100"
        >
          <span id="article-date"></span>
          <span>•</span>
          <span id="article-author"></span>
        </div>

        <img
          id="article-thumbnail"
          src=""
          alt=""
          class="w-full rounded-2xl shadow-sm mb-8 hidden object-cover max-h-[420px]"
        />

        <div
          id="article-content"
          class="text-gray-700 text-[15px] sm:text-base"
        ></div>

        <div
          class="mt-12 pt-6 border-t border-orange-100 flex justify-between items-center"
        >
          <a
            href="blog.html"
            class="inline-flex items-center px-5 py-2.5 rounded-full border border-brand-200 text-brand-700 text-sm font-bold hover:bg-brand-50 transition-colors"
          >
            <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> More Articles
          </a>
          <button
            onclick="shareArticle()"
            class="inline-flex items-center px-5 py-2.5 rounded-full bg-brand-700 text-white text-sm font-bold hover:bg-brand-900 transition-colors"
          >
            <i data-lucide="share-2" class="w-4 h-4 mr-2"></i> Share
          </button>
        </div>
      </article>
    </main>

    <footer
      id="contact"
      class="bg-white border-t-4 border-red-700 pt-12 sm:pt-16 pb-10 sm:pb-12 mt-auto relative z-10"
    >
      <div class="container mx-auto px-4 sm:px-6">
        <div
          class="border-t border-red-100 pt-6 sm:pt-8 text-center text-xs sm:text-sm text-gray-500"
        >
          <span
            >&copy; <span id="current-year">2026</span> UIUSVS. All rights
            reserved.</span
          >
        </div>
      </div>
    </footer>

    <!-- Toast -->
    <div
      id="toast"
      class="fixed bottom-10 right-5 z-[200] transition-all duration-300 opacity-0 pointer-events-none translate-y-10"
    >
      <div
        class="px-6 py-4 rounded-xl shadow-2xl font-bold text-sm text-white flex items-center gap-3 bg-brand-900 border-l-4 border-brand-500"
      >
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toast-message">Link copied!</span>
      </div>
    </div>

    <script>
      lucide.createIcons();
      document.getElementById("current-year").textContent =
        new Date().getFullYear();

      const API_BASE = "https://uiusvs.onrender.com/api";

      // Get slug from ?slug=... (works whether it arrives via clean-URL rewrite or directly)
      function getSlugFromUrl() {
        const params = new URLSearchParams(window.location.search);
        if (params.get("slug")) return params.get("slug");

        // Fallback: if someone lands on /blog/some-slug directly without rewrite,
        // pull the last path segment.
        const parts = window.location.pathname.split("/").filter(Boolean);
        if (parts.length >= 2 && parts[0] === "blog")
          return parts[parts.length - 1];
        return null;
      }

      function showToast(message) {
        const toast = document.getElementById("toast");
        document.getElementById("toast-message").textContent = message;
        toast.classList.remove(
          "opacity-0",
          "translate-y-10",
          "pointer-events-none",
        );
        setTimeout(() => {
          toast.classList.add(
            "opacity-0",
            "translate-y-10",
            "pointer-events-none",
          );
        }, 2500);
      }

      function shareArticle() {
        if (navigator.share) {
          navigator
            .share({
              title: document.getElementById("article-title").textContent,
              url: window.location.href,
            })
            .catch(() => {});
        } else {
          navigator.clipboard.writeText(window.location.href);
          showToast("Link copied to clipboard!");
        }
      }

      async function loadArticle() {
        const slug = getSlugFromUrl();
        if (!slug) {
          showError();
          return;
        }

        try {
          const res = await fetch(
            `${API_BASE}/blogs/slug/${encodeURIComponent(slug)}`,
          );
          if (!res.ok) {
            showError();
            return;
          }
          const blog = await res.json();
          renderArticle(blog);
        } catch (e) {
          showError();
        }
      }

      function showError() {
        document.getElementById("loading-state").classList.add("hidden");
        document.getElementById("error-state").classList.remove("hidden");
      }

      function renderArticle(b) {
        document.getElementById("loading-state").classList.add("hidden");
        document.getElementById("article-wrap").classList.remove("hidden");

        document.title = `${b.title} | UIUSVS Blog`;
        const desc = document.querySelector('meta[name="description"]');
        if (desc)
          desc.setAttribute("content", b.meta_description || b.excerpt || "");

        document.getElementById("article-category").textContent =
          b.category || "";
        document.getElementById("article-title").textContent = b.title || "";
        document.getElementById("article-author").textContent =
          `By ${b.author_name || "Admin"}`;

        const dateSource = b.post_date || b.created_at;
        document.getElementById("article-date").textContent = dateSource
          ? new Date(dateSource).toLocaleDateString("en-US", {
              month: "short",
              day: "numeric",
              year: "numeric",
            })
          : "";

        if (b.thumbnail_url) {
          const img = document.getElementById("article-thumbnail");
          img.src = b.thumbnail_url;
          img.alt = b.title;
          img.classList.remove("hidden");
        }

        document.getElementById("article-content").innerHTML = b.content || "";
        lucide.createIcons();
      }

      loadArticle();
    </script>
  </body>
</html>

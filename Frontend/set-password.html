<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Your Password | UIUSVS</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-orange-50 min-h-screen flex items-center justify-center p-4">
    <div
      class="bg-white rounded-2xl shadow-md border border-orange-100 p-8 w-full max-w-sm"
    >
      <h1 class="text-xl font-bold text-red-900 mb-6 text-center">
        Set Your Password
      </h1>
      <form id="set-form" class="space-y-4">
        <input
          id="password"
          type="password"
          required
          placeholder="New password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-orange-400"
        />
        <input
          id="password2"
          type="password"
          required
          placeholder="Confirm password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-orange-400"
        />
        <button
          type="submit"
          class="w-full bg-red-700 hover:bg-red-800 text-white font-bold rounded-lg py-2.5 text-sm"
        >
          Save Password
        </button>
      </form>
      <p id="msg" class="text-xs text-center mt-4"></p>
    </div>

    <script>
      const API_BASE = "https://uiusvs.onrender.com/api";
      const token = new URLSearchParams(window.location.search).get("token");

      document
        .getElementById("set-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const p1 = document.getElementById("password").value;
          const p2 = document.getElementById("password2").value;
          const msg = document.getElementById("msg");

          if (p1 !== p2) {
            msg.textContent = "Passwords do not match";
            msg.className = "text-xs text-center mt-4 text-red-600";
            return;
          }
          const res = await fetch(`${API_BASE}/admin-users/set-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, password: p1 }),
          });
          const data = await res.json();
          if (!res.ok) {
            msg.textContent = data.error || "Something went wrong";
            msg.className = "text-xs text-center mt-4 text-red-600";
            return;
          }
          msg.textContent = "Password set! Redirecting to login...";
          msg.className = "text-xs text-center mt-4 text-green-600";
          setTimeout(() => (window.location.href = "/admin-login.html"), 1500);
        });
    </script>
  </body>
</html>

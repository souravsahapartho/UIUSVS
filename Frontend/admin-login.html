<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | UIUSVS</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-orange-50 min-h-screen flex items-center justify-center p-4">
    <div
      class="bg-white rounded-2xl shadow-md border border-orange-100 p-8 w-full max-w-sm"
    >
      <h1 class="text-xl font-bold text-red-900 mb-6 text-center">
        Admin Login
      </h1>

      <!-- STEP 1: email/password -->
      <form id="login-form" class="space-y-4">
        <input
          id="email"
          type="email"
          required
          placeholder="Email"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-orange-400"
        />
        <input
          id="password"
          type="password"
          required
          placeholder="Password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-orange-400"
        />
        <button
          type="submit"
          class="w-full bg-red-700 hover:bg-red-800 text-white font-bold rounded-lg py-2.5 text-sm"
        >
          Log In
        </button>
        <button
          type="button"
          onclick="showForgot()"
          class="w-full text-xs text-orange-600 hover:underline"
        >
          Forgot password?
        </button>
      </form>

      <!-- STEP 2: OTP -->
      <form id="otp-form" class="space-y-4 hidden">
        <p class="text-sm text-gray-600">
          Enter the 6-digit code sent to your email.
        </p>
        <input
          id="otp"
          required
          placeholder="123456"
          maxlength="6"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-orange-400 text-center tracking-widest"
        />
        <button
          type="submit"
          class="w-full bg-red-700 hover:bg-red-800 text-white font-bold rounded-lg py-2.5 text-sm"
        >
          Verify
        </button>
      </form>

      <!-- FORGOT PASSWORD -->
      <form id="forgot-form" class="space-y-4 hidden">
        <input
          id="forgot-email"
          type="email"
          required
          placeholder="Email"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-orange-400"
        />
        <button
          type="submit"
          class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg py-2.5 text-sm"
        >
          Send Reset Code
        </button>
      </form>

      <!-- RESET PASSWORD -->
      <form id="reset-form" class="space-y-4 hidden">
        <input
          id="reset-otp"
          required
          placeholder="6-digit code"
          maxlength="6"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-orange-400 text-center tracking-widest"
        />
        <input
          id="reset-password"
          type="password"
          required
          placeholder="New password"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-orange-400"
        />
        <button
          type="submit"
          class="w-full bg-red-700 hover:bg-red-800 text-white font-bold rounded-lg py-2.5 text-sm"
        >
          Set New Password
        </button>
      </form>

      <p id="msg" class="text-xs text-center mt-4"></p>
    </div>

    <script>
      const API_BASE = "https://uiusvs.onrender.com/api";
      let tempToken = null;
      let forgotEmail = null;

      function setMsg(text, isError = true) {
        const el = document.getElementById("msg");
        el.textContent = text;
        el.className =
          "text-xs text-center mt-4 " +
          (isError ? "text-red-600" : "text-green-600");
      }

      function showForgot() {
        document.getElementById("login-form").classList.add("hidden");
        document.getElementById("forgot-form").classList.remove("hidden");
      }

      document
        .getElementById("login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          const res = await fetch(`${API_BASE}/auth/login`, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();

          if (!res.ok)
            return setMsg(data.message || data.error || "Login failed");

          if (data.requires2FA) {
            tempToken = data.tempToken;
            document.getElementById("login-form").classList.add("hidden");
            document.getElementById("otp-form").classList.remove("hidden");
            setMsg("Code sent to your email.", false);
          } else {
            window.location.href = "/admin.html";
          }
        });

      document
        .getElementById("otp-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const otp = document.getElementById("otp").value;
          const res = await fetch(`${API_BASE}/auth/verify-2fa`, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tempToken, otp }),
          });
          const data = await res.json();
          if (!res.ok) return setMsg(data.error || "Invalid code");
          window.location.href = "/admin.html";
        });

      document
        .getElementById("forgot-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          forgotEmail = document.getElementById("forgot-email").value;
          const res = await fetch(`${API_BASE}/auth/forgot-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: forgotEmail }),
          });
          const data = await res.json();
          if (!res.ok)
            return setMsg(data.message || data.error || "Request failed");
          document.getElementById("forgot-form").classList.add("hidden");
          document.getElementById("reset-form").classList.remove("hidden");
          setMsg("If that account exists, a code was sent.", false);
        });

      document
        .getElementById("reset-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const otp = document.getElementById("reset-otp").value;
          const newPassword = document.getElementById("reset-password").value;
          const res = await fetch(`${API_BASE}/auth/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: forgotEmail, otp, newPassword }),
          });
          const data = await res.json();
          if (!res.ok) return setMsg(data.error || "Reset failed");
          setMsg("Password updated. You can log in now.", false);
          document.getElementById("reset-form").classList.add("hidden");
          document.getElementById("login-form").classList.remove("hidden");
        });
    </script>
  </body>
</html>

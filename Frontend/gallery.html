<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Gallery | UIUSVS</title>
    <meta
      name="description"
      content="A visual journey through our celebrations, prayers, and cultural gatherings at UIU SVS."
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#fffaf0",
                100: "#ffedd5",
                500: "#ea580c",
                700: "#b91c1c",
                900: "#4a0404",
              },
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              serif: ["Playfair Display", "serif"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #fffaf0;
        color: #4a0404;
        overflow-x: hidden;
      }
      .glass-nav {
        background: rgba(255, 250, 240, 0.9);
        backdrop-filter: blur(12px);
        border-bottom: 2px solid #fbbf24;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #fffaf0;
      }
      ::-webkit-scrollbar-thumb {
        background: #ea580c;
        border-radius: 4px;
      }

      .mandala-pattern {
        background-image:
          radial-gradient(
            circle at 100% 50%,
            rgba(255, 215, 0, 0.05) 0%,
            transparent 50%
          ),
          url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ea580c' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M30 0L60 30L30 60L0 30z'/%3E%3C/g%3E%3C/svg%3E");
        background-attachment: fixed;
      }

      .masonry {
        column-count: 1;
        column-gap: 1.5rem;
      }
      @media (min-width: 640px) {
        .masonry {
          column-count: 2;
        }
      }
      @media (min-width: 1024px) {
        .masonry {
          column-count: 3;
        }
      }
      .masonry-item {
        break-inside: avoid;
        margin-bottom: 1.5rem;
      }

      #mobile-drawer {
        transition: transform 0.3s ease-in-out;
      }
    </style>
  </head>
  <body class="antialiased min-h-screen flex flex-col mandala-pattern">
    <header class="glass-nav sticky top-0 z-50 shadow-sm">
      <div
        class="container mx-auto px-4 py-3 flex justify-between items-center"
      >
        <a href="index.html" class="flex items-center gap-3">
          <div
            class="w-10 h-10 bg-white rounded-full shadow border border-orange-200 flex items-center justify-center text-xl overflow-hidden relative"
          >
            <span
              class="absolute inset-0 flex items-center justify-center animate-pulse opacity-20 bg-orange-100"
            ></span>
            <span class="relative z-10 text-orange-600">🕉️</span>
          </div>
          <span
            class="font-serif font-bold text-xl text-brand-900 tracking-tight"
            >UIUSVS</span
          >
        </a>

        <nav class="hidden md:flex gap-6 items-center">
          <a
            href="index.html"
            class="text-sm font-bold text-gray-700 hover:text-brand-700 transition"
            >Home</a
          >
          <a
            href="members.html"
            class="text-sm font-bold text-gray-700 hover:text-brand-700 transition"
            >Members</a
          >
          <a
            href="members.html"
            class="text-sm font-bold text-brand-700 border-b-2 border-brand-700 pb-1"
            >Gallery</a
          >
          <a
            href="blog.html"
            class="text-sm font-bold text-gray-700 hover:text-brand-700 transition"
            >Blog</a
          >
          <a
            href="login.html"
            class="text-sm font-bold text-white bg-brand-700 px-4 py-1.5 rounded-full hover:bg-brand-900 transition shadow-sm"
            >My Profile</a
          >
        </nav>

        <button class="md:hidden text-brand-900 p-2" onclick="toggleDrawer()">
          <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
      </div>
    </header>

    <div
      id="mobile-drawer"
      class="fixed inset-y-0 right-0 w-64 bg-white shadow-2xl z-[100] transform translate-x-full md:hidden flex flex-col"
    >
      <div
        class="p-4 border-b border-orange-100 flex justify-between items-center bg-brand-50"
      >
        <span class="font-serif font-bold text-lg text-brand-900">Menu</span>
        <button
          onclick="toggleDrawer()"
          class="text-gray-500 hover:text-red-500"
        >
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>
      <nav class="flex flex-col p-4 gap-4">
        <a
          href="index.html"
          class="font-bold text-gray-700 hover:text-brand-700"
          >Home</a
        >
        <a
          href="alumni.html"
          class="font-bold text-gray-700 hover:text-brand-700"
          >Members</a
        >
        <a href="gallery.html" class="font-bold text-brand-700">Gallery</a>
        <a href="blog.html" class="font-bold text-gray-700 hover:text-brand-700"
          >Blog</a
        >
        <hr class="border-orange-100" />
        <a
          href="login.html"
          class="font-bold text-white bg-brand-700 text-center py-2 rounded-xl shadow-sm"
          >My Profile</a
        >
      </nav>
    </div>
    <div
      id="drawer-overlay"
      class="fixed inset-0 bg-black/50 z-[90] hidden md:hidden"
      onclick="toggleDrawer()"
    ></div>

    <main class="container mx-auto px-4 py-12 flex-1 relative z-10">
      <div class="text-center mb-8">
        <h1
          class="text-4xl md:text-5xl font-serif font-extrabold text-brand-900 mb-3"
        >
          Moments in Time
        </h1>
        <p class="text-gray-600 max-w-xl mx-auto text-sm sm:text-base">
          A visual journey through our celebrations, prayers, and cultural
          gatherings.
        </p>
      </div>

      <!-- Search Bar -->
      <div class="max-w-md mx-auto mb-8 relative">
        <i
          data-lucide="search"
          class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"
        ></i>
        <input
          type="text"
          id="gallery-search"
          oninput="searchGallery(this.value)"
          class="w-full pl-12 pr-4 py-3 rounded-full border border-orange-200 focus:ring-2 focus:ring-brand-500 outline-none shadow-sm text-sm"
          placeholder="Search memories by caption..."
        />
      </div>

      <div
        class="flex flex-wrap justify-center gap-2 mb-10"
        id="category-filters"
      >
        <!-- Populated dynamically -->
      </div>

      <div class="masonry" id="gallery-grid">
        <div class="text-center text-gray-500 py-10 col-span-full w-full">
          <i
            data-lucide="loader-2"
            class="w-8 h-8 animate-spin mx-auto text-brand-500"
          ></i>
        </div>
      </div>
    </main>

    <footer class="bg-white border-t border-orange-200 py-8 relative z-10">
      <div class="container mx-auto px-4 text-center">
        <p class="text-sm text-gray-600 mb-2">
          United International University, Dhaka
        </p>
        <p class="text-xs text-gray-400">
          &copy; 2026 UIUSVS. Developed by Sourav Saha.
        </p>
      </div>
    </footer>

    <!-- Lightbox (No Alert) -->
    <div
      id="lightbox"
      class="fixed inset-0 bg-black/95 z-[200] hidden items-center justify-center p-4 backdrop-blur-sm opacity-0 transition-opacity duration-300 cursor-zoom-out"
      onclick="closeLightbox()"
    >
      <button
        class="absolute top-6 right-6 text-white bg-white/10 hover:bg-white/30 border border-white/20 p-2.5 rounded-full transition-colors z-50 shadow-lg"
        onclick="closeLightbox()"
      >
        <i data-lucide="x" class="w-6 h-6"></i>
      </button>
      <img
        id="lightbox-img"
        src=""
        class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl scale-95 transition-transform duration-300"
        onclick="event.stopPropagation()"
      />

      <div
        class="absolute bottom-8 left-0 w-full text-center pointer-events-none"
      >
        <span
          id="lightbox-caption"
          class="bg-black/70 text-white px-5 py-2.5 rounded-full text-sm font-bold backdrop-blur-md border border-white/10"
          >Caption</span
        >
      </div>
    </div>

    <script>
      lucide.createIcons();
      function toggleDrawer() {
        const drawer = document.getElementById("mobile-drawer");
        const overlay = document.getElementById("drawer-overlay");
        drawer.classList.toggle("translate-x-full");
        overlay.classList.toggle("hidden");
      }

      const API_BASE = "https://uiusvs.onrender.com/api";
      let mockGallery = [];

      async function loadGalleryFromDB(isBackgroundRefresh = false) {
        try {
          const res = await fetch(`${API_BASE}/gallery/public`);
          const newData = await res.json();

          // Only re-render if data actually changed (avoids unnecessary flicker)
          const newDataStr = JSON.stringify(newData);
          const oldDataStr = JSON.stringify(mockGallery);

          if (newDataStr !== oldDataStr) {
            mockGallery = newData;
            renderFilters();
            renderGallery();
          }
        } catch (e) {
          console.warn("Failed to load gallery from DB", e);
          if (!isBackgroundRefresh) {
            renderFilters();
            renderGallery();
          }
        }
      }

      let currentCat = "All";
      let gallerySearchQuery = "";

      function renderGallery() {
        const grid = document.getElementById("gallery-grid");

        // Filter by Category and Search
        const filtered = mockGallery.filter((g) => {
          const matchesCat = currentCat === "All" || g.category === currentCat;
          const matchesSearch = g.title
            .toLowerCase()
            .includes(gallerySearchQuery.toLowerCase());
          return matchesCat && matchesSearch;
        });

        if (filtered.length === 0) {
          grid.innerHTML = `<div class="text-center text-gray-500 py-10 col-span-full w-full font-medium">No images found.</div>`;
          return;
        }

        grid.innerHTML = filtered
          .map(
            (img) => `
                <div class="masonry-item group cursor-zoom-in" onclick="openLightbox('${img.url}', '${img.title}')">
                    <div class="relative overflow-hidden rounded-2xl shadow-sm hover:shadow-2xl transition-all border-4 border-white bg-white">
                        <img src="${img.url}" alt="${img.title}" class="w-full h-auto object-cover group-hover:scale-105 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-5">
                            <span class="text-white font-serif font-bold text-lg drop-shadow-md translate-y-4 group-hover:translate-y-0 transition-transform duration-300">${img.title}</span>
                        </div>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      function renderFilters() {
        const container = document.getElementById("category-filters");
        const cats = ["All", ...new Set(mockGallery.map((g) => g.category))];

        container.innerHTML = cats
          .map(
            (c) => `
                <button onclick="setFilter('${c}')" class="filter-btn px-5 py-2 rounded-full text-xs sm:text-sm font-bold transition-all shadow-sm ${c === currentCat ? "bg-brand-700 text-white scale-105" : "bg-white text-brand-700 border border-brand-200 hover:bg-brand-50 hover:scale-105"}">
                    ${c}
                </button>
            `,
          )
          .join("");
      }

      window.setFilter = (cat) => {
        currentCat = cat;
        renderFilters();
        renderGallery();
      };

      window.searchGallery = (query) => {
        gallerySearchQuery = query;
        renderGallery();
      };

      window.openLightbox = (url, title) => {
        const lb = document.getElementById("lightbox");
        const img = document.getElementById("lightbox-img");
        document.getElementById("lightbox-caption").textContent = title;
        img.src = url;

        lb.classList.remove("hidden");
        lb.classList.add("flex");
        setTimeout(() => {
          lb.classList.remove("opacity-0");
          img.classList.remove("scale-95");
          img.classList.add("scale-100");
        }, 10);
        document.body.style.overflow = "hidden";
      };

      window.closeLightbox = () => {
        const lb = document.getElementById("lightbox");
        const img = document.getElementById("lightbox-img");
        lb.classList.add("opacity-0");
        img.classList.remove("scale-100");
        img.classList.add("scale-95");

        setTimeout(() => {
          lb.classList.add("hidden");
          lb.classList.remove("flex");
          document.body.style.overflow = "";
        }, 300);
      };

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeLightbox();
      });

      loadGalleryFromDB();

      // 🎯 Auto-refresh gallery every 15 seconds to reflect DB changes instantly
      setInterval(() => {
        loadGalleryFromDB();
      }, 15000); // 15 second cycle — dorkar hole 5000 (5s) o kora jay
    </script>
  </body>
</html>
